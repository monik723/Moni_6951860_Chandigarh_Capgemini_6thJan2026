<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .btn {
            padding: 10px 15px;
            margin: 10px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #667eea;
            color: white;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #5563c1;
        }

        form {
            display: none;
            text-align: left;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .switch {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
        }

        .switch span {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="question">
        <h2>Are you already a user?</h2>
        <button class="btn" onclick="showLogin()">Yes, Login</button>
        <button class="btn" onclick="showRegister()">No, Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
        <h2>Login</h2>

        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" required>

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required>

        <button type="submit" class="btn">Login</button>

        <div class="switch">
            Not registered? <span onclick="showRegister()">Register</span>
        </div>
    </form>

    <!-- Registration Form -->
    <form id="registerForm">
        <h2>Register</h2>

        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" placeholder="Enter username" required>

        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="Enter email" required>

        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Enter password" required>

        <button type="submit" class="btn">Register</button>

        <div class="switch">
            Already a user? <span onclick="showLogin()">Login</span>
        </div>
    </form>
</div>

<script>
    function showLogin() {
        document.getElementById("question").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("registerForm").style.display = "none";
    }

    function showRegister() {
        document.getElementById("question").style.display = "none";
        document.getElementById("registerForm").style.display = "block";
        document.getElementById("loginForm").style.display = "none";
    }
</script>

</body>
</html>
