<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Card</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:400px;
}

h1{
    color:#ff4081;
    font-size:36px;
}

.message{
    font-size:18px;
    margin:15px 0;
}

button{
    background:#ff4081;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e91e63;
    transform:scale(1.1);
}

#surprise{
    display:none;
    margin-top:20px;
    font-size:20px;
    color:#4caf50;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🎉 Happy Birthday To Me 🎂</h1>

<p class="message">
Today is my special day! Feeling grateful and excited for new beginnings.
</p>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<p id="surprise">🎉 Congrats for M1! Keep shining and achieving more! 🚀</p>

</div>

<script>
function showSurprise(){
    document.getElementById("surprise").style.display="block";
}
</script>

</body>
</html>
