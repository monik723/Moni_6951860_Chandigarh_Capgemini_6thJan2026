<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74ebd5,#9face6);
    transition:0.5s;
}

.container{
    background:white;
    padding:30px;
    width:380px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:70%;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#45a049;
}

.weatherCard{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f5f5f5;
}

.icon{
    font-size:40px;
}

</style>
</head>

<body>

<div class="container">

<h2>🌦 Weather Today</h2>

<input type="text" id="cityInput" placeholder="Enter city name">

<br>

<button onclick="checkWeather()">Check Weather</button>

<div class="weatherCard" id="weatherResult">
<p>Enter a city to see weather</p>
</div>

</div>

<script>

function checkWeather(){

let city = document.getElementById("cityInput").value.toLowerCase();

let temp;
let condition;
let icon;

if(city === "paris"){
    temp = "22°C";
    condition = "Sunny";
    icon = "☀️";
    document.body.style.background="linear-gradient(135deg,#fddb92,#f6d365)";
}

else if(city === "london"){
    temp = "16°C";
    condition = "Rainy";
    icon = "🌧";
    document.body.style.background="linear-gradient(135deg,#5f9cff,#4facfe)";
}

else if(city === "tokyo"){
    temp = "19°C";
    condition = "Cloudy";
    icon = "☁️";
    document.body.style.background="linear-gradient(135deg,#bdc3c7,#2c3e50)";
}

else{
    temp = "20°C";
    condition = "Sunny";
    icon = "☀️";
    document.body.style.background="linear-gradient(135deg,#fddb92,#f6d365)";
}

document.getElementById("weatherResult").innerHTML =
"<div class='icon'>"+icon+"</div>" +
"<h3>City: "+city.charAt(0).toUpperCase()+city.slice(1)+"</h3>" +
"<p>Temperature: "+temp+"</p>" +
"<p>Condition: "+condition+"</p>";

}

</script>

</body>
</html>
